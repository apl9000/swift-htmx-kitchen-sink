# Docker Compose file for Vapor
#
# Install Docker on your system to run and test
# your Vapor app in a production-like environment.
#
# Note: This file is intended for testing and does not
# implement best practices for a production deployment.
#
# Learn more: https://docs.docker.com/compose/reference/
#
#   Build images: docker-compose build
#      Start app: docker-compose up app
#       Stop all: docker-compose down
#
x-shared_environment: &shared_environment
  LOG_LEVEL: ${LOG_LEVEL:-debug}
  DB_TYPE: ${DB_TYPE:-sqlite}

services:
  app:
    image: swift-htmx-kitchen-sink:latest
    build:
      context: .
    environment:
      <<: *shared_environment
    ports:
      - '8888:8888'
    command: ["serve", "--env", "development", "--hostname", "0.0.0.0", "--port", "8888"]

  # PostgreSQL mode: docker compose --profile postgres up
  app-postgres:
    image: swift-htmx-kitchen-sink:latest
    build:
      context: .
    environment:
      <<: *shared_environment
      DB_TYPE: postgres
      DATABASE_URL: postgres://vapor:vapor@db:5432/kitchen_sink
    ports:
      - '8888:8888'
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - postgres
    command: ["serve", "--env", "production", "--hostname", "0.0.0.0", "--port", "8888"]

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vapor
      POSTGRES_PASSWORD: vapor
      POSTGRES_DB: kitchen_sink
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vapor -d kitchen_sink"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles:
      - postgres

  migrate:
    image: swift-htmx-kitchen-sink:latest
    build:
      context: .
    environment:
      <<: *shared_environment
    command: ["migrate", "--yes"]
    deploy:
      replicas: 0

  revert:
    image: swift-htmx-kitchen-sink:latest
    build:
      context: .
    environment:
      <<: *shared_environment
    command: ["migrate", "--revert", "--yes"]
    deploy:
      replicas: 0

volumes:
  pgdata:
