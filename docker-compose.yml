# Docker Compose file for Vapor
version: '3.8'

x-shared_environment: &shared_environment
  LOG_LEVEL: ${LOG_LEVEL:-debug}
  
services:
  app:
    image: swift-kitchen-sink:latest
    build:
      context: .
    environment:
      <<: *shared_environment
    ports:
      - '8080:8080'
    volumes:
      - .:/app
    command: > 
      watchexec 
      -e swift,leaf,html,css
      --restart --
      swift run App serve --hostname 0.0.0.0 --port 8080

  tailwind:
    image: node:latest
    working_dir: /app
    volumes:
      - .:/app
    command: >
      npx tailwindcss
      -i ./Resources/Public/app.css
      -o ./Resources/Public/styles.css
      --watch

  livereload:
    image: node:latest
    working_dir: /app
    volumes:
      - .:/app
    command: >
     npx livereload ./Resources/Public
    ports:
      - '35729:35729'

  migrate:
    image: swift-kitchen-sink:latest
    build:
      context: .
    environment:
      <<: *shared_environment
    command: ["migrate", "--yes"]
    deploy:
      replicas: 0

  revert:
    image: swift-kitchen-sink:latest
    build:
      context: .
    environment:
      <<: *shared_environment
    command: ["migrate", "--revert", "--yes"]
    deploy:
      replicas: 0
