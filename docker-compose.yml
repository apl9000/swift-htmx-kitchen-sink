x-shared_environment: &shared_environment
  LOG_LEVEL: ${LOG_LEVEL:-debug}
  
services:
  app:
    image: swift-kitchen-sink:latest
    build:
      context: .
    environment:
      <<: *shared_environment
    ports:
      - '8080:8080'
    volumes:
      - .:/app
    command: > 
      watchexec 
      -e swift,leaf,html,css
      --restart --
      swift run App serve --hostname 0.0.0.0 --port 8080

  migrate:
    image: swift-kitchen-sink:latest
    build:
      context: .
    environment:
      <<: *shared_environment
    command: ["migrate", "--yes"]
    deploy:
      replicas: 0

  revert:
    image: swift-kitchen-sink:latest
    build:
      context: .
    environment:
      <<: *shared_environment
    command: ["migrate", "--revert", "--yes"]
    deploy:
      replicas: 0
